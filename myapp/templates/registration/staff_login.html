<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | CST Department</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Outfit', 'sans-serif'],
                    },
                    colors: {
                        tech: {
                            blue: '#0ea5e9',
                            cyan: '#22d3ee',
                            indigo: '#6366f1',
                            dark: '#0f172a',
                            slate: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-tech-radial {
            background: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        }
        .glow-blue {
            box-shadow: 0 0 50px -15px rgba(14, 165, 233, 0.5);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px -3px rgba(14, 165, 233, 0.3);
            border-color: #0ea5e9;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="bg-tech-radial min-h-screen flex items-center justify-center p-6 overflow-hidden relative">

    <!-- Abstract Background Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-tech-blue/10 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tech-indigo/10 blur-[120px] rounded-full"></div>

    <div class="w-full max-w-[480px] relative z-10">
        <!-- Logo/Header Area -->
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-tech-blue to-tech-indigo rounded-[2rem] flex items-center justify-center mx-auto mb-6 glow-blue animate-float">
                <i class="fas fa-shield-halved text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight leading-none mb-2">Staff <span class="text-tech-blue">Gateway</span></h1>
            <p class="text-slate-400 text-sm font-medium uppercase tracking-[0.2em]">CST Department Security</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-[2.5rem] p-10 md:p-12 shadow-2xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-tech-blue/5 rounded-bl-[5rem] -mr-10 -mt-10 transition-all group-hover:bg-tech-blue/10"></div>
            
            {% if messages %}
                {% for message in messages %}
                <div class="mb-8 p-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 flex items-center text-rose-400">
                    <i class="fas fa-circle-exclamation mr-3 text-sm"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'unified_staff_login' %}" class="space-y-8">
                {% csrf_token %}
                
                <div class="space-y-6">
                    <!-- Username Field -->
                    <div class="space-y-2 group">
                        <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest ml-4 block transition-colors group-focus-within:text-tech-blue">Professional Username</label>
                        <div class="relative">
                            <i class="fas fa-user-tie absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm transition-colors group-focus-within:text-tech-blue"></i>
                            <input type="text" name="username" required 
                                placeholder="Enter Username"
                                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-5 pl-14 pr-6 text-white text-sm font-semibold placeholder:text-slate-600 focus:outline-none input-glow transition-all">
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="space-y-2 group">
                        <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest ml-4 block transition-colors group-focus-within:text-tech-blue">Private Key (Password)</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm transition-colors group-focus-within:text-tech-blue"></i>
                            <input type="password" name="password" required 
                                placeholder="••••••••"
                                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-5 pl-14 pr-6 text-white text-sm font-semibold placeholder:text-slate-600 focus:outline-none input-glow transition-all">
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <div class="w-5 h-5 border-2 border-slate-700 rounded-lg flex items-center justify-center transition-all group-hover:border-tech-blue">
                            <div class="w-2 h-2 bg-tech-blue rounded-sm opacity-0 group-hover:opacity-20"></div>
                        </div>
                        <span class="text-xs font-bold text-slate-500 hover:text-slate-400 transition-colors">Trust device</span>
                        <input type="checkbox" class="hidden">
                    </label>
                    <a href="#" class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest hover:text-tech-blue transition-colors">Recover Access</a>
                </div>

                <button type="submit" class="w-full bg-tech-blue hover:bg-tech-cyan text-white py-5 rounded-2xl font-bold text-xs uppercase tracking-[0.2em] shadow-lg shadow-tech-blue/20 transition-all active:scale-95 flex items-center justify-center space-x-3">
                    <span>Finalize Authentication</span>
                    <i class="fas fa-arrow-right text-[10px]"></i>
                </button>
            </form>
        </div>

        <!-- Footer Links -->
        <div class="mt-12 flex items-center justify-center space-x-8">
            <a href="{% url 'home' %}" class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest hover:text-white transition-colors">
                <i class="fas fa-house mr-2"></i> Department Home
            </a>
            <div class="h-4 w-[1px] bg-slate-800"></div>
            <a href="{% url 'student_login' %}" class="text-[10px] font-extrabold text-slate-400 hover:text-tech-blue uppercase tracking-widest transition-all">
                Student Access <i class="fas fa-graduation-cap ml-2"></i>
            </a>
        </div>
    </div>

    <!-- UI Decoration: Pulse Circles -->
    <div class="fixed top-20 right-20 w-32 h-32 border border-slate-800 rounded-full animate-pulse opacity-20"></div>
    <div class="fixed bottom-20 left-20 w-64 h-64 border border-slate-800 rounded-full animate-pulse opacity-10" style="animation-delay: 1s;"></div>
</body>
</html>
