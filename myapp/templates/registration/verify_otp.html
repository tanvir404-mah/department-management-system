<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | CST Department</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-indigo-50/50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800">Phone Verification</h1>
            <p class="text-slate-500 mt-2">Enter the 6-digit code sent to <span class="font-bold text-slate-700">{{ phone }}</span></p>
        </div>

        <!-- Alert Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-2xl {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-100{% else %}bg-rose-50 text-rose-700 border border-rose-100{% endif %} flex items-center shadow-sm">
                    <span class="text-sm font-semibold">{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <!-- OTP Verification Card -->
        <div class="bg-white rounded-[2rem] shadow-2xl shadow-blue-900/5 p-10 border border-white">
            <form method="POST" class="space-y-8">
                {% csrf_token %}
                
                <div class="flex flex-col space-y-4">
                    <label class="text-center text-sm font-bold text-slate-400 uppercase tracking-widest">Verification Code</label>
                    <div class="flex justify-center">
                        {{ form.otp_code }}
                    </div>
                </div>

                <div class="flex flex-col space-y-4">
                    <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transform active:scale-95 transition-all duration-200">
                        Verify and Register
                    </button>
                    
                    <button type="button" class="text-center text-sm text-slate-400 hover:text-blue-600 font-medium transition-colors duration-200">
                        Didn't receive the code? <span class="underline">Resend OTP</span>
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center mt-10 text-slate-400 text-xs">
            By verifying, you agree to our 
            <a href="#" class="font-bold text-slate-500 hover:text-slate-800">Terms of Service</a> 
            and 
            <a href="#" class="font-bold text-slate-500 hover:text-slate-800">Privacy Policy</a>
        </p>
    </div>

    <!-- Simple JS to focus input on load -->
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const otpInput = document.querySelector('input[name="otp_code"]');
            if (otpInput) otpInput.focus();
        });
    </script>
</body>
</html>
