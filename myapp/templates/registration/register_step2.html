<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2: Verification | CST Department</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <!-- Logo & Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-500 rounded-3xl shadow-2xl shadow-emerald-200 mb-6 transform hover:scale-105 transition-transform duration-300">
                <i class="fas fa-shield-alt text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Security Check</h1>
            <p class="text-slate-500 mt-2 font-medium">Verification code sent to your phone</p>
            
            <!-- Step Progress Indicator -->
            <div class="flex justify-center items-center mt-8 space-x-3">
                <div class="flex flex-col items-center">
                    <div class="w-10 h-2 bg-emerald-500 rounded-full"></div>
                    <span class="text-[10px] uppercase font-bold text-emerald-600 mt-1">Identity</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-10 h-2 bg-blue-600 rounded-full"></div>
                    <span class="text-[10px] uppercase font-bold text-blue-600 mt-1">Verify</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-10 h-2 bg-slate-200 rounded-full"></div>
                    <span class="text-[10px] uppercase font-bold text-slate-400 mt-1">Secure</span>
                </div>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-2xl {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700 border-emerald-100{% else %}bg-rose-50 text-rose-700 border-rose-100{% endif %} border shadow-sm flex items-center">
                    <i class="fas {% if message.tags == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %} mr-3"></i>
                    <span class="text-sm font-semibold">{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <div class="glass-card rounded-[2.5rem] shadow-2xl shadow-blue-900/10 p-10 border border-white">
            <form method="POST" action="{% url 'student_registration_step2' %}" class="space-y-8">
                {% csrf_token %}
                
                <div class="text-center space-y-6">
                    <label class="text-center text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">6-Digit Code</label>
                    <div class="flex justify-center items-center">
                        {{ form.otp_code }}
                    </div>
                </div>

                <div class="space-y-4">
                    <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-xl transform active:scale-95 transition-all duration-300">
                        Verify Code
                    </button>
                    
                    <button type="button" class="w-full text-center text-sm text-slate-400 hover:text-blue-600 font-bold transition-colors duration-200 py-2">
                        Didn't receive the code? <span class="text-blue-600 underline underline-offset-4">Resend OTP</span>
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center mt-10 text-slate-400 text-[10px] uppercase tracking-[0.2em] font-bold">
            Encrypted & Secure Verification
        </p>
    </div>
</body>
</html>
