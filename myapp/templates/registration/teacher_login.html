<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login | CST Department</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-emerald {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="bg-[#f0fdfa] min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-teal-100 via-white to-emerald-50">
    <div class="max-w-md w-full">
        <!-- Logo & Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-emerald-600 rounded-[2rem] shadow-2xl shadow-emerald-200 mb-8 transform hover:rotate-3 transition-transform duration-300">
                <i class="fas fa-chalkboard-teacher text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Faculty <span class="text-emerald-600">Access</span></h1>
            <p class="text-slate-500 mt-3 font-bold text-sm uppercase tracking-widest leading-none">CST Department Management System</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-2xl bg-rose-50 text-rose-700 border border-rose-100 shadow-sm flex items-center animate-pulse">
                    <i class="fas fa-exclamation-circle mr-3"></i>
                    <span class="text-xs font-bold uppercase tracking-wide">{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}

        <div class="glass-emerald rounded-[2.5rem] shadow-2xl shadow-emerald-900/10 p-10 border border-white">
            <form method="POST" action="{% url 'teacher_login' %}" class="space-y-8">
                {% csrf_token %}
                
                <!-- Username Field -->
                <div class="space-y-3">
                    <label class="block text-xs font-extrabold text-slate-500 ml-1 uppercase tracking-widest">Faculty Username</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-emerald-600 transition-colors">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <input type="text" name="username" required 
                            class="block w-full pl-11 pr-4 py-4 bg-white border-2 border-slate-100 rounded-2xl text-slate-900 font-bold focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all duration-200 placeholder:text-slate-300"
                            placeholder="Enter your system ID">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <label class="block text-xs font-extrabold text-slate-500 uppercase tracking-widest">Security Password</label>
                        <a href="#" class="text-[10px] font-extrabold text-emerald-600 hover:text-emerald-800 uppercase tracking-tight">Support / Reset</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-emerald-600 transition-colors">
                            <i class="fas fa-key"></i>
                        </div>
                        <input type="password" name="password" required 
                            class="block w-full pl-11 pr-4 py-4 bg-white border-2 border-slate-100 rounded-2xl text-slate-900 font-bold focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all duration-200 placeholder:text-slate-300"
                            placeholder="••••••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-5 rounded-2xl shadow-xl shadow-emerald-500/20 transform hover:-translate-y-1 active:scale-[0.98] transition-all duration-300 flex items-center justify-center space-x-3 text-sm uppercase tracking-widest">
                    <span>Authorized Entry</span>
                    <i class="fas fa-shield-alt text-sm"></i>
                </button>
            </form>
        </div>
        
        <div class="text-center mt-12 space-y-4">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">
                &copy; 2025 CST DEPARTMENT MANAGEMENT SYSTEM
            </p>
            <p class="text-slate-400 text-[9px] italic">
                Unauthorized access to this portal is strictly prohibited and monitored.
            </p>
        </div>
    </div>
</body>
</html>
