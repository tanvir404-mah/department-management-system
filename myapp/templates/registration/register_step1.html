<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Registration | CST Department</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo & Progress -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
                <span class="text-2xl text-white font-bold">Step 1</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Student Registration</h1>
            <p class="text-slate-500 mt-2">Enter your roll and phone to start</p>
            
            <!-- Progress Bar -->
            <div class="flex justify-center items-center mt-6 space-x-2">
                <div class="w-8 h-2 bg-blue-600 rounded-full"></div>
                <div class="w-8 h-2 bg-slate-200 rounded-full"></div>
                <div class="w-8 h-2 bg-slate-200 rounded-full"></div>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-xl {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700{% else %}bg-rose-50 text-rose-700{% endif %} border shadow-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Roll Number</label>
                    {{ form.roll_number }}
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
                    {{ form.phone_number }}
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                    Send Verification OTP
                </button>
            </form>
        </div>
        
        <p class="text-center mt-8 text-slate-500 text-sm">
            Already have an account? <a href="{% url 'student_login' %}" class="text-blue-600 font-semibold underline">Login</a>
        </p>
    </div>
</body>
</html>
