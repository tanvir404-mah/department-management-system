<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Login | CST Command Center</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-[#fafafa] flex items-center justify-center min-h-screen p-6 overflow-hidden">

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 bg-gradient-to-br from-indigo-50/50 to-white"></div>
    <div class="fixed -top-24 -right-24 w-96 h-96 bg-indigo-100/30 rounded-full blur-3xl"></div>
    <div class="fixed -bottom-24 -left-24 w-96 h-96 bg-indigo-50/50 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md animate-fade-in space-y-8">
        
        <!-- Brand Header -->
        <div class="text-center space-y-4">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-xl shadow-indigo-100 mb-2 transform hover:rotate-6 transition-transform">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">HOD Login</h1>
            <p class="text-[10px] font-extrabold text-indigo-600 uppercase tracking-[0.2em] italic">Departmental Control Center</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl shadow-indigo-900/5 relative overflow-hidden">
            <form method="POST" class="space-y-8">
                {% csrf_token %}

                {% if messages %}
                <div class="bg-rose-50 border border-rose-100 p-4 rounded-2xl animate-shake">
                    {% for message in messages %}
                        <p class="text-[10px] font-extrabold text-rose-600 uppercase tracking-widest text-center">{{ message }}</p>
                    {% endfor %}
                </div>
                {% endif %}

                <!-- Username -->
                <div class="space-y-3">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Admin Username</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-indigo-600 transition-colors">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                        <input type="text" name="username" required
                            class="block w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all"
                            placeholder="hod_cst_fpi">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Secret Word</label>
                        <a href="#" class="text-[9px] font-extrabold text-indigo-600 uppercase tracking-widest hover:underline">Reset</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-indigo-600 transition-colors">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </div>
                        <input type="password" name="password" required
                            class="block w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-5 rounded-2xl shadow-xl shadow-indigo-100 transform hover:-translate-y-1 active:scale-[0.98] transition-all text-xs uppercase tracking-widest flex items-center justify-center">
                    <span>Enter Command Center</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 ml-2"></i>
                </button>
            </form>
        </div>

        <!-- System Status Footer -->
        <div class="flex items-center justify-center space-x-6 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
            <a href="{% url 'home' %}" class="hover:text-indigo-600 transition-colors flex items-center">
                <i data-lucide="arrow-left" class="w-3 h-3 mr-2"></i> Back to Campus
            </a>
            <span class="opacity-30">|</span>
            <div class="flex items-center space-x-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
                <span>Secured SSL Portal</span>
            </div>
        </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
