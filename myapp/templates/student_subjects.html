<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CST Subjects | Faridpur Polytechnic Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        /* Custom styles to enhance the Bootstrap look */
        body {
            background-color: #f8f9fa;
            /* Light background */
            font-family: 'Poppins', sans-serif;
        }

        .header-section {
            background-color: #007bff;
            /* Primary blue header background */
            color: white;
            padding: 20px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .header-section h1,
        .header-section h3,
        .header-section h4 {
            font-weight: 600;
            margin: 0;
        }

        .subject-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-left: 5px solid #007bff;
            /* Highlight on the left */
        }

        .subject-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15) !important;
        }

        .form-control {
            border-radius: 0.5rem;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
    </style>
</head>

<body>

    <header class="header-section text-center w-100">
        <div class="container">
            <h1>Faridpur Polytechnic Institute, Faridpur</h1>
            <h3>Department Of Computer Science & Technology</h3>
            <h4>Subjects List With Code</h4>
        </div>
    </header>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">

                <div class="mb-4 d-flex flex-column align-items-center">
                    <label for="semester" class="form-label fs-5 fw-bold mb-3">Select Semester:</label>
                    <select id="semester" class="form-select w-75 form-select-lg">
                        <option value="1">1st Semester</option>
                        <option value="2">2nd Semester</option>
                        <option value="3">3rd Semester</option>
                        <option value="4">4th Semester</option>
                        <option value="5">5th Semester</option>
                        <option value="6" selected>6th Semester</option>
                        <option value="7">7th Semester</option>
                    </select>
                </div>

                <ul id="subject-list" class="list-unstyled">
                </ul>

                <div class="text-center mt-5">
                    <button onclick="history.back()" class="btn btn-primary btn-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-arrow-left" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8" />
                        </svg>
                        &nbsp; Back
                    </button>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script>
        const subjectsBySemester = {
            1: ["Mathematics-1", "English", "Introduction to Computing", "Physics-1"],
            2: ["Mathematics-2", "Physics-2", "Programming Fundamentals"],
            3: ["Data Structures", "Computer Architecture", "Digital Electronics-1"],
            4: ["Algorithms", "Operating Systems", "Digital Electronics-2"],
            5: ["Microprocessors", "Java Programming", "Data Communication"],
            6: [
                "Microcontroller - 28564",
                "Web Development - 28566",
                "Database Management - 28561",
                "Sensor & IoT System - 28563",
                "Computer Networking - 28562",
                "Industrial Management - 25852",
                "Principal of Marketing - 25851"
            ],
            7: ["AI & ML", "Cloud Computing", "Cybersecurity", "Project Management"]
        };

        const semesterSelect = document.getElementById("semester");
        const subjectList = document.getElementById("subject-list");

        function updateSubjects() {
            const sem = semesterSelect.value;
            subjectList.innerHTML = ""; // Clear existing list

            const currentSubjects = subjectsBySemester[sem];

            if (currentSubjects) {
                currentSubjects.forEach(sub => {
                    const li = document.createElement("li");
                    // Using Bootstrap Card for a professional look
                    li.innerHTML = `
                        <div class="card subject-card shadow-sm mb-3">
                            <div class="card-body">
                                <h5 class="card-title mb-0">${sub}</h5>
                            </div>
                        </div>
                    `;
                    subjectList.appendChild(li);
                });
            }
        }

        // Initial load and event listener
        updateSubjects();
        semesterSelect.addEventListener("change", updateSubjects);
    </script>

</body>

</html>
