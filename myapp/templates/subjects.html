<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        select {
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }

        ul {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 500px;
        }

        li {
            background: #fff;
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.12);
        }

        button {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Faridpur Polytechnic Institute,Faridpur</h1>
    <h3>Department Of Computer Science & Technology</h3>
    <h4>Subjects List With Code</h4>
    

    

    <select id="semester">
        <option value="1">1st Semester</option>
        <option value="2">2nd Semester</option>
        <option value="3">3rd Semester</option>
        <option value="4">4th Semester</option>
        <option value="5">5th Semester</option>
        <option value="6" selected>6th Semester</option>
        <option value="7">7th Semester</option>
    </select>

    <ul id="subject-list"></ul>

    <button onclick="history.back()">← Back</button>

    <script>
        const subjectsBySemester = {
    1: ["Mathematics-1", "English", "Introduction to Computing", "Physics-1"],
    2: ["Mathematics-2", "Physics-2", "Programming Fundamentals"],
    3: ["Data Structures", "Computer Architecture", "Digital Electronics-1"],
    4: ["Algorithms", "Operating Systems", "Digital Electronics-2"],
    5: ["Microprocessors", "Java Programming", "Data Communication"],
    6: ["Microcontroller-28564", "Web Development-28566", "Database Management-28561", "Sensor & IoT System-28563", "Computer Networking-28562", "Industrial Management-25852", "Principal of Marketing-25851"],
    7: ["AI & ML", "Cloud Computing", "Cybersecurity", "Project Management"]
        };

        const semesterSelect = document.getElementById("semester");
        const subjectList = document.getElementById("subject-list");

        function updateSubjects() {
            const sem = semesterSelect.value;
            subjectList.innerHTML = "";
            subjectsBySemester[sem].forEach(sub => {
                const li = document.createElement("li");
                li.textContent = sub;
                subjectList.appendChild(li);
            });
        }

        updateSubjects();
        semesterSelect.addEventListener("change", updateSubjects);
    </script>

</body>
</html>
