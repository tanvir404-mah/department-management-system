<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - CST Department</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .contact-container {
      width: 90%;
      max-width: 700px;
      margin: 60px auto;
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .contact-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #222;
      font-weight: 600;
      font-size: 28px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      width: 95%;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #3498db;
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
    }

    .form-group textarea {
      resize: none;
      min-height: 120px;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #2980b9;
    }

    .contact-info {
      margin-top: 30px;
      text-align: center;
      font-size: 15px;
      color: #555;
      line-height: 1.6;
    }

    .contact-info p {
      margin: 10px 0;
    }

    .contact-info span {
      font-weight: 600;
      color: #333;
    }

    footer {
      text-align: center;
      background: #003366;
      color: white;
      padding: 15px 10px;
      margin-top: auto;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      .contact-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="contact-container">
    <h2>Contact Us</h2>
    <form action="#" method="post">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
      </div>
      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" placeholder="Write your message..." required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <p>📍 <span>Address:</span> Baitul Aman, A.F. Mujibur Rahman (ICS) Sarani, Faridpur 7803</p>
      <p>📞 <span>Phone:</span> 01700000000</p>
      <p>✉ <span>Email:</span> principal@gmail.com</p>
      <p>🌐 <span>Website:</span> www.cst-department.edu.bd</p>
    </div>
  </div>

  <footer>
    <p>© 2025 Computer Science And Technology Department. All Rights Reserved.</p>
  </footer>
</body>
</html>
