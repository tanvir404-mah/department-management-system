<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* --- Reset & Fonts --- */
* {
     box-sizing: border-box; 
     margin:0; padding:0; 
     font-family: 'Poppins', sans-serif; }
body { display:flex; min-height:100vh; background:#111827; color:#f0f0f0; transition: background 0.3s; }

/* --- Sidebar --- */
.sidebar {
    width:260px; background: linear-gradient(180deg,#4f46e5,#4338ca);
    padding:25px 20px; position:fixed; top:0; left:0; height:100vh;
    display:flex; flex-direction:column; justify-content:space-between; transition: width 0.3s;
    box-shadow: 4px 0 20px rgba(0,0,0,0.6); z-index:200;
}
.sidebar.collapsed { width:70px; }
.sidebar h2 { font-weight:700; font-size:28px; text-align:center; margin-bottom:40px; letter-spacing:2px; text-shadow:0 2px 6px rgba(0,0,0,0.3);}
.sidebar nav a { display:flex; align-items:center; padding:15px 20px; color:#d1d5db; font-weight:500; font-size:16px; text-decoration:none; border-radius:8px; margin-bottom:12px; transition: background 0.3s, color 0.3s; }
.sidebar nav a i { margin-right:12px; font-size:18px; width:22px; text-align:center; }
.sidebar nav a:hover, .sidebar nav a.active { background: rgba(255 255 255 / 0.15); color:#fff; font-weight:700; box-shadow:0 0 10px #6366f1; }
.sidebar .profile { border-top:1px solid rgba(255 255 255 /0.2); padding-top:20px; text-align:center; }
.sidebar .profile img { width:70px; height:70px; border-radius:50%; border:2px solid #8b5cf6; margin-bottom:12px; box-shadow:0 0 8px #8b5cf6aa; transition: transform 0.3s;}
.sidebar .profile img:hover { transform: scale(1.05);}
.sidebar .profile p { font-weight:600; margin-bottom:4px; }
.sidebar .profile span { font-size:14px; color:#a5b4fc; }

/* --- Main Content --- */
.main { margin-left:260px; flex:1; padding:25px 30px; overflow-y:auto; min-height:100vh; transition: margin-left 0.3s;}
.topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
.topbar h1 { font-size:32px; font-weight:700; color:#a5b4fc; text-shadow:0 0 8px #a5b4fcaa; }
.topbar .user { font-weight:600; background:#4338ca; padding:10px 18px; border-radius:30px; box-shadow:0 0 10px #6366f1cc; color:white; display:flex; align-items:center; gap:10px; }
.topbar .user i { font-size:18px; }

/* --- Summary Cards --- */
.summary-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:40px; }
.card { background:#1e293b; border-radius:15px; padding:25px 30px; box-shadow:0 0 15px rgba(100,100,255,0.4); transition: transform 0.3s ease; cursor:default; position:relative; overflow:hidden; }
.card::before { content:""; position:absolute; top:0; left:-50%; width:200%; height:100%; background: linear-gradient(120deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2), rgba(255,255,255,0.1)); transform: skewX(-20deg) translateX(-100%); transition: transform 0.5s; }
.card:hover::before { transform: skewX(-20deg) translateX(0%);}
.card h3 { font-size:20px; margin-bottom:10px; color:#c7d2fe; letter-spacing:1px; }
.card p { font-size:36px; font-weight:700; color:#a5b4fc; text-shadow:0 0 5px #a5b4fcbb; }

/* --- Table --- */
.subject-table { width:100%; border-collapse:collapse; background:#1e293b; border-radius:12px; overflow:hidden; box-shadow:0 0 20px rgba(99,102,241,0.5); margin-bottom:50px;}
.subject-table th, .subject-table td { padding:15px 20px; border-bottom:1px solid #374151; text-align:left; color:#c7d2fe; }
.subject-table th { background:#4338ca; font-weight:600; letter-spacing:1px; font-size:15px; }
.subject-table tr:hover { background:#3730a3; cursor:pointer; }
.action-buttons button { margin-right:8px; padding:8px 14px; border:none; border-radius:6px; cursor:pointer; color:white; font-weight:600; font-size:14px; box-shadow:0 0 8px rgba(0,0,0,0.2); transition: all 0.3s; }
.edit-btn { background:#fbbf24; box-shadow:0 0 10px #fbbf24aa; }
.delete-btn { background:#ef4444; box-shadow:0 0 10px #ef4444aa; }
.action-buttons button:hover { transform:scale(1.05); opacity:0.85; }

/* --- Modals --- */
.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:300; }
.modal-content { background:#1e293b; padding:30px 35px; border-radius:15px; width:450px; max-width:95%; box-shadow:0 0 25px rgba(99,102,241,0.7); animation:fadeIn 0.3s ease; color:#e0e7ff; }
.modal-content h2 { margin-bottom:20px; color:#a5b4fc; font-weight:700; letter-spacing:1.5px; }
.modal-content input, .modal-content textarea { width:100%; padding:14px 18px; margin:12px 0; border:none; border-radius:10px; background:#374151; font-size:15px; color:#e0e7ff; resize:vertical; outline:none; transition: box-shadow 0.3s ease; }
.modal-content input:focus, .modal-content textarea:focus { box-shadow:0 0 15px #a5b4fcaa; background:#4338ca; }
.modal-content .btn { margin-top:20px; width:100%; background:#6366f1; font-weight:700; font-size:16px; box-shadow:0 0 12px #6366f1cc; transition: background 0.3s ease; }
.modal-content .btn:hover { background:#4f46e5; }
.modal-content .btn.delete-btn { background:#ef4444; margin-top:10px; }
.modal-content .btn.delete-btn:hover { background:#b91c1c; }

@keyframes fadeIn { from{opacity:0; transform:scale(0.95);} to{opacity:1; transform:scale(1);} }

/* --- Responsive --- */
@media (max-width:900px){.sidebar{width:200px;}.main{margin-left:200px;padding:20px 25px;}.summary-cards{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}}
@media (max-width:600px){body{flex-direction:column;}.sidebar{position:relative;width:100%;height:auto;box-shadow:none;padding-bottom:15px;border-bottom:1px solid #4338ca;}.main{margin-left:0;padding:15px 20px;}.summary-cards{grid-template-columns:1fr;gap:15px;}.topbar{flex-direction:column;gap:10px;}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">

    
    <nav>
        
        <div class="profile">
            <img src="https://img.freepik.com/premium-vector/education-material-icon-vector-illustration_1287271-8064.jpg?w=740" alt="User Avatar" />
            <p>Teacher Name</p>
            <span>Designation: </span>
        </div>
        <h2>Teacher Dashboard</h2>
        <a href="{% url 'teacher_dashboard' %}" class="active"><i class="fas fa-tachometer-alt"></i>Dashboard</a>
        <a href="{% url 'subjects' %}"><i class="fas fa-book"></i>Subjects</a>
        <a href="{% url 'student' %}"><i class="fas fa-user-graduate"></i>Students</a>
        <a href="{% url 'attendance' %}"><i class="fas fa-calendar-check"></i>Attendance</a>
        <a href="{% url 'create_assignment' %}"><i class="fas fa-tasks"></i>Assignments</a>
        <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i>Logout</a>
    </nav>
    
</div>

<div class="main">
    <div class="topbar">
        <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
        <div class="user"><i class="fas fa-user-circle"></i> Admin</div>
    </div>

    <div class="summary-cards">
        <div class="card"><h3>Total Subjects</h3><p id="totalSubjects">0</p></div>
        <div class="card"><h3>Total Students</h3><p id="totalStudents">0</p></div>
        <div class="card"><h3>Attendance %</h3><p id="attendancePercent">0%</p></div>
        <div class="card"><h3>Upcoming Assignments</h3><p id="upcomingAssignments">3</p></div>
    </div>

    <canvas id="attendanceChart" style="max-width:600px; margin-bottom:50px;"></canvas>

    <h1 style="margin-bottom:20px;"><i class="fas fa-book"></i> Subjects Management</h1>
    <input type="text" id="searchInput" placeholder="Search Subjects..." oninput="filterSubjects()" style="width:250px; padding:10px 15px; border-radius:50px; border:none; margin-bottom:20px; box-shadow:0 0 15px #a5b4fccc; background:#1e293b; color:#e0e7ff; outline:none;">

    <table class="subject-table">
        <thead>
            <tr><th>#</th><th>Subject Code</th><th>Subject Name</th><th>Description</th><th>Actions</th></tr>
        </thead>
        <tbody id="subject-list"></tbody>
    </table>
</div>

<script>
// --- Sample Subject Data ---
let subjects = [
    { id: 1, code: "CST101", name: "Programming 1", desc: "Intro to C and Python" },
    { id: 2, code: "CST102", name: "Data Structures", desc: "Arrays, Lists, Trees" },
    { id: 3, code: "CST103", name: "Database Systems", desc: "SQL, ER Diagrams" },
];

document.getElementById('totalSubjects').innerText = subjects.length;
document.getElementById('totalStudents').innerText = 75;
document.getElementById('attendancePercent').innerText = "92%";

function renderSubjects(list = subjects){
    const tbody = document.getElementById('subject-list');
    tbody.innerHTML = "";
    if(list.length === 0){
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:#a5b4fc; padding:20px;'>No subjects found.</td></tr>";
        return;
    }
    list.forEach((sub,idx)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx+1}</td><td>${sub.code}</td><td>${sub.name}</td><td>${sub.desc}</td>
        <td class="action-buttons">
            <button class="edit-btn"><i class="fas fa-edit"></i> Edit</button>
            <button class="delete-btn"><i class="fas fa-trash"></i> Delete</button>
        </td>`;
        tbody.appendChild(tr);
    });
}

function filterSubjects(){
    const filter = document.getElementById('searchInput').value.toLowerCase();
    const filtered = subjects.filter(sub => sub.code.toLowerCase().includes(filter) || sub.name.toLowerCase().includes(filter) || sub.desc.toLowerCase().includes(filter));
    renderSubjects(filtered);
}

// --- Attendance Chart ---
const ctx = document.getElementById('attendanceChart').getContext('2d');
new Chart(ctx,{
    type:'line',
    data:{
        labels:['Week 1','Week 2','Week 3','Week 4'],
        datasets:[{
            label:'Attendance %',
            data:[90,92,91,94],
            borderColor:'#6366f1',
            backgroundColor:'rgba(99,102,241,0.2)',
            tension:0.3,
            fill:true,
            pointRadius:5
        }]
    },
    options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#c7d2fe' } } }, scales:{ x:{ ticks:{ color:'#c7d2fe' } }, y:{ ticks:{ color:'#c7d2fe' }, beginAtZero:true, max:100 } } }
});

renderSubjects();
</script>
</body>
</html>
