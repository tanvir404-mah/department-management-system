<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Assignment</title>
    <style>
        /* Basic Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .container h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #3498db;
            outline: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #2980b9;
        }

        .message {
            margin-top: 20px;
            text-align: center;
            color: green;
            font-weight: bold;
        }

        @media (max-width: 650px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Assignment</h2>
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" placeholder="Enter subject" required>
        </div>

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" placeholder="Enter assignment title" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Enter assignment description" required></textarea>
        </div>

        <div class="form-group">
            <label>Submission Date</label>
            <input type="date" name="due_date">
        </div>

        <div class="form-group">
            <label>Teacher Name</label>
            <input type="text" name="teacher_name" placeholder="Enter your name" required>
        </div>

        <button type="submit" class="btn-submit">Create Assignment</button>
    </form>

    {% for message in messages %}
        <div class="message">{{ message }}</div>
    {% endfor %}
</div>

</body>
</html>
